services:
  - type: web
    name: portfolio-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_TO
        sync: false
      - key: CONTACT_FROM
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
